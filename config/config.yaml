# Number of articles to pull from each feed (kept low for source diversity)
max_items_per_feed: 3

# RSS feeds - diverse sources to avoid over-representing any single outlet
rss_feeds:
  # General tech / independent
  - name: "Wired"
    url: "https://www.wired.com/feed/rss"
  - name: "MIT Technology Review"
    url: "https://www.technologyreview.com/feed/"
  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/technology-lab"

  # Mainstream news tech desks
  - name: "BBC Technology"
    url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
  - name: "The Guardian Technology"
    url: "https://www.theguardian.com/technology/rss"

  # Startup / business / VC angle
  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
  - name: "VentureBeat"
    url: "https://venturebeat.com/feed/"

  # Deep-tech / research angle
  - name: "The Verge"
    url: "https://www.theverge.com/rss/index.xml"
  - name: "ZDNet"
    url: "https://www.zdnet.com/news/rss.xml"

  # AI-specific sources
  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
  - name: "IEEE Spectrum"
    url: "https://spectrum.ieee.org/feeds/feed.rss"
